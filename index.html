<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuffCore Architect</title>

<style>
body {
  background:#0b1220;
  color:white;
  font-family:Arial;
  padding:20px;
}

.module {
  background:#18233b;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

.selected {
  border:2px solid #4f8cff;
}

button {
  margin:5px;
  padding:10px;
}
</style>
</head>

<body>

<h1>DuffCore Architect</h1>

<button onclick="setRecommended()">Mode recommandé</button>

<div id="modules"></div>

<script>

const modules = [
  {
    id:"orchestrator",
    name:"Orchestrateur",
    options:["Node-RED","LangGraph","n8n"]
  },
  {
    id:"llm",
    name:"LLM",
    options:["OpenAI","Ollama","Hybride"]
  },
  {
    id:"memory",
    name:"Mémoire",
    options:["Qdrant","Chroma","SQLite"]
  }
];

let selected = {};

function render() {
  const root = document.getElementById("modules");
  root.innerHTML = "";

  modules.forEach(m => {
    const div = document.createElement("div");
    div.className = "module";

    const current = selected[m.id] || "non défini";

    div.innerHTML = `
      <h3>${m.name}</h3>
      <p>Actif : ${current}</p>
    `;

    m.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.innerText = opt;

      btn.onclick = () => {
        selected[m.id] = opt;
        render();
      };

      div.appendChild(btn);
    });

    root.appendChild(div);
  });
}

function setRecommended(){
  selected = {
    orchestrator:"Node-RED",
    llm:"OpenAI",
    memory:"Qdrant"
  };
  render();
}

render();

</script>

</body>
</html>
