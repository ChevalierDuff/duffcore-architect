<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuffCore Architect V9</title>

<style>
body { background:#0b1220; color:white; font-family:Arial; padding:10px; }

details {
  background:#18233b;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}

select {
  width:100%;
  padding:8px;
  margin-top:5px;
}

.layer {
  margin-bottom:15px;
}

.plan {
  background:#111a30;
  padding:10px;
  border-radius:10px;
  position:sticky;
  bottom:0;
}

h2 { font-size:16px; margin:10px 0; }
</style>
</head>

<body>

<h2>DuffCore Architect V9</h2>

<div id="app"></div>

<div class="plan">
<pre id="analysis"></pre>
</div>

<script>

const layers = [
{
name:"Entrée",
modules:[
{
id:"communication",
name:"Communication",
options:["Telegram","Web UI","CLI"]
},
{
id:"perception",
name:"Perception",
options:["Texte","Whisper (voix)","OCR (image)","Multimodal"]
}
]
},

{
name:"Intelligence",
modules:[
{
id:"interpretation",
name:"Interprétation",
options:["Parsing simple","Structuration avancée"]
},
{
id:"llm",
name:"LLM",
options:["OpenAI","Ollama","Hybride"]
},
{
id:"planning",
name:"Planification",
options:["Direct LLM","LangChain","LangGraph"]
}
]
},

{
name:"Mémoire & outils",
modules:[
{
id:"memory",
name:"Mémoire",
options:["SQLite","Chroma","Qdrant"]
},
{
id:"tools",
name:"Outils",
options:["OCR","Browser","API tools","Custom scripts"]
}
]
},

{
name:"Exécution",
modules:[
{
id:"orchestrator",
name:"Orchestrateur",
options:["Node-RED","LangGraph","n8n"]
},
{
id:"action",
name:"Action",
options:["Python","Node","API"]
}
]
},

{
name:"Contrôle",
modules:[
{
id:"security",
name:"Sécurité",
options:["Basique","Sandbox","Validation avancée"]
},
{
id:"monitoring",
name:"Monitoring",
options:["Logs","LangSmith","Grafana"]
},
{
id:"introspection",
name:"Introspection",
options:["Aucune","Simple","Avancée"]
}
]
}
];

let state = {};

function render(){

let html = "";

layers.forEach(layer => {

html += `<div class="layer"><h2>${layer.name}</h2>`;

layer.modules.forEach(m => {

html += `
<details>
<summary>${m.name} (${state[m.id] || "choisir"})</summary>

<select onchange="select('${m.id}', this.value)">
<option value="">-- choisir --</option>
${m.options.map(o => `<option ${state[m.id]===o?"selected":""}>${o}</option>`).join("")}
</select>

</details>
`;

});

html += "</div>";

});

document.getElementById("app").innerHTML = html;

analyze();
}

function select(id,value){
state[id] = value;
render();
}

function analyze(){

let text = "Architecture DuffCore\n\n";

Object.keys(state).forEach(k=>{
text += `${k} : ${state[k]}\n`;
});

document.getElementById("analysis").textContent = text;
}

render();

</script>

</body>
</html>
