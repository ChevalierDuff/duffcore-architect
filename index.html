<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuffCore Architect V4</title>

<style>
body {
  background:#0b1220;
  color:white;
  font-family:Arial;
  padding:15px;
}

details {
  background:#18233b;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

select {
  width:100%;
  padding:10px;
  margin-top:10px;
}

.plan {
  background:#111a30;
  padding:15px;
  border-radius:10px;
  position:sticky;
  bottom:0;
}

h1 { font-size:22px; }

</style>
</head>

<body>

<h1>DuffCore Architect</h1>

<div id="modules"></div>

<div class="plan">
<h3>Plan</h3>
<pre id="plan"></pre>
</div>

<script>

const modules = [
{
id:"orchestrator",
name:"Orchestrateur",
options:["Node-RED","LangGraph","n8n"]
},
{
id:"llm",
name:"LLM",
options:["OpenAI","Ollama","Hybride"]
},
{
id:"memory",
name:"Mémoire",
options:["Qdrant","Chroma","SQLite"]
}
];

let state = {};

function render(){

let html = "";

modules.forEach(m => {

html += `
<details>
<summary>${m.name} (${state[m.id] || "choisir"})</summary>

<select onchange="select('${m.id}', this.value)">
<option value="">-- choisir --</option>
${m.options.map(o => `<option ${state[m.id]===o?"selected":""}>${o}</option>`).join("")}
</select>

</details>
`;

});

document.getElementById("modules").innerHTML = html;

generatePlan();
}

function select(id,value){
state[id] = value;
render();
}

function generatePlan(){

let text = "Architecture:\n\n";

modules.forEach(m=>{
text += `${m.name} : ${state[m.id] || "non défini"}\n`;
});

text += "\nÉtapes:\n";
text += "1. Orchestrateur\n";
text += "2. LLM\n";
text += "3. Mémoire\n";

document.getElementById("plan").textContent = text;

}

render();

</script>

</body>
</html>
